<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 901 421" width="901" height="421" role="img" aria-labelledby="title desc">
  <title id="title">A&amp;M Plumbing branded service van</title>
  <desc id="desc">A white service van edited into A&amp;M Plumbing red, black, and white branding.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="10" flood-color="#000" flood-opacity="0.36"/>
    </filter>
    <linearGradient id="glass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#14252d"/>
      <stop offset="1" stop-color="#6e858b"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
      <stop offset="0" stop-color="#b90000"/>
      <stop offset="0.45" stop-color="#e00000"/>
      <stop offset="1" stop-color="#9b0000"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <image href="van-source.png" x="0" y="0" width="901" height="421" preserveAspectRatio="xMidYMid meet"/>

    <!-- Clean off the original Hoover branding and repaint as A&M. -->
    <path d="M351 82 L836 76 L842 188 L340 188 Z" fill="#f8f8f6" opacity="0.98"/>
    <path d="M365 96 L829 91 L832 178 L352 178 Z" fill="none" stroke="#111" stroke-width="5"/>
    <path d="M365 100 L829 95 L832 113 L363 119 Z" fill="#cf0000"/>
    <path d="M348 191 L858 187 L862 234 L335 237 Z" fill="#f8f8f6" opacity="0.96"/>
    <path d="M28 233 L872 229 L879 265 L25 268 Z" fill="url(#red)"/>
    <path d="M29 268 L875 264 L879 291 L27 295 Z" fill="#080808"/>
    <path d="M30 294 L872 290 L872 319 L32 321 Z" fill="#171717" opacity="0.78"/>

    <!-- Re-tint small original blue pieces to black so the van matches A&M. -->
    <path d="M37 207 L315 219 L303 241 L29 231 Z" fill="#101010" opacity="0.82"/>
    <path d="M42 184 L73 190 L69 205 L36 202 Z" fill="#cf0000" opacity="0.9"/>

    <!-- A&M side badge. -->
    <g transform="translate(548 135) rotate(-0.7)">
      <ellipse cx="0" cy="0" rx="134" ry="78" fill="#050505"/>
      <ellipse cx="0" cy="0" rx="122" ry="67" fill="#d40000"/>
      <ellipse cx="0" cy="0" rx="109" ry="57" fill="#fff"/>
      <path d="M-95 -42 C-45 -72 45 -72 95 -42" fill="none" stroke="#050505" stroke-width="5"/>
      <text x="0" y="-2" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="58" font-weight="900" fill="#d00000" stroke="#050505" stroke-width="3" paint-order="stroke fill">A&amp;M</text>
      <text x="0" y="42" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="34" font-weight="900" fill="#d00000" stroke="#050505" stroke-width="2" paint-order="stroke fill" letter-spacing="1">PLUMBING</text>
      <path d="M-80 50 L80 50" stroke="#050505" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Rear service panel. -->
    <text x="742" y="125" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="24" font-weight="900" fill="#111" letter-spacing="1">WATER HEATERS</text>
    <text x="742" y="154" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#111" letter-spacing="1">DRAINS · LEAKS · REPAIRS</text>
    <text x="742" y="178" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="18" font-weight="900" fill="#d00000" letter-spacing="1">RESIDENTIAL PLUMBING</text>

    <!-- Door/hood text replacement. -->
    <rect x="356" y="120" width="184" height="24" rx="5" fill="#f8f8f6"/>
    <text x="448" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#d00000">AMPlumbing.com</text>

    <!-- Red stripe slogan and phone number: cleaner and not warped. -->
    <text x="471" y="255" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="25" font-weight="900" fill="#fff" stroke="#8f0000" stroke-width="1" paint-order="stroke fill" letter-spacing="1.2">WHEN YOU WANT IT DONE RIGHT, CALL A&amp;M!</text>
    <text x="693" y="309" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="35" font-weight="900" fill="#fff" stroke="#050505" stroke-width="2" paint-order="stroke fill" letter-spacing="1">248-240-0384</text>

    <!-- Subtle A&M front badge. -->
    <circle cx="103" cy="245" r="25" fill="#fff" stroke="#d00000" stroke-width="6"/>
    <text x="103" y="254" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="24" fill="#d00000" stroke="#111" stroke-width="1" paint-order="stroke fill">A&amp;M</text>
  </g>
</svg>
